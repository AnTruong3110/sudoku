server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # This app is a single small HTML file that changes often — never let the
    # browser serve a stale copy. Always revalidate against the server.
    location / {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        try_files $uri $uri/ /index.html;
    }
}
